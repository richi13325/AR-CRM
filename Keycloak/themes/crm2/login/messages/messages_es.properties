# ============================================================
# Pipely Login Templates — Spanish Messages
# ============================================================
# These override default Keycloak messages for the crm2 login theme.
# Keycloak falls back to its base messages when a key is not found here.

# -- Título genérico de páginas de información ----------------
infoTitle=Información
pageTitle=Pipely — {0}

# -- Verificación de correo (página intermedia) ---------------
confirmEmailAddressVerificationHeader=Confirma la validez de tu dirección de correo electrónico
confirmEmailAddressVerification=Para completar la verificación de tu dirección de correo electrónico, haz clic en el botón que aparece a continuación.
proceedWithAction=Haz clic aquí para continuar

# -- Cuenta actualizada (página final de éxito) ----------------
accountUpdatedTitle=Tu cuenta ha sido actualizada
accountUpdatedMessage=Tu cuenta ha sido actualizada correctamente.

# -- Correo verificado (página de confirmación) ----------------
emailVerifiedMessageHeader=Correo electrónico verificado
emailVerifiedMessage=Tu dirección de correo electrónico fue verificada correctamente.
emailVerifiedAlreadyMessageHeader=El correo electrónico ya fue verificado
emailVerifiedAlreadyMessage=Tu dirección de correo electrónico ya había sido verificada.

# -- Redirección y enlaces comunes ----------------------------
pageRedirectMessage=Serás redirigido automáticamente. Si no ocurre, haz clic en el siguiente enlace.
backToApplication=Volver a la aplicación
backToLogin=Volver al inicio de sesión

# -- Enlaces y estados de verificación ------------------------
expiredActionMessage=La acción expiró. Inicia sesión nuevamente para continuar.
staleEmailVerificationLink=El enlace que abriste ya no es válido. Es posible que tu correo electrónico ya haya sido verificado.

# ============================================================
# Pipely Email Templates — Spanish Messages (English Locale)
# ============================================================
# This file forces Mexican Spanish copy when Keycloak resolves
# the `en` locale for the email theme. It intentionally mirrors
# the Spanish content of `messages_es.properties` and the
# `messages.properties` default bundle.

# -- Asunto de correos ----------------------------------------
emailSubject=Pipely — Tu código de verificación

# -- Plantilla: Verificación de email ------------------------
emailVerification.subject=Pipely — Verifica tu dirección de correo electrónico
emailVerification.body=\
Hola {0},\n\n\
Para verificar tu correo electrónico, haz clic en el siguiente enlace:\n\n\
{2}\n\n\
Si no solicitaste este enlace, puedes ignorar este mensaje.\n\n\
Saludos,\n\
El equipo de Pipely

# -- Plantilla: Olvidé mi contraseña -------------------------
forgotPassword.subject=Pipely — Restablecer contraseña
forgotPassword.body=\
Hola {0},\n\n\
Se solicitó un restablecimiento de contraseña para tu cuenta.\n\
Haz clic en el siguiente enlace para crear una nueva contraseña:\n\n\
{1}\n\n\
Si no solicitaste este cambio, tu contraseña seguirá siendo la misma.\n\n\
Saludos,\n\
El equipo de Pipely

# -- Plantilla: Actualizar contraseña (acciones ejecutadas) --
executeActions.subject=Pipely — Acción requerida en tu cuenta
executeActions.body=\
Hola {0},\n\n\
Se requiere que realices la siguiente acción en tu cuenta:\n\
{3}\n\n\
Haz clic en el siguiente enlace para completar la acción:\n\n\
{1}\n\n\
Este enlace expira en {4}.\n\n\
Saludos,\n\
El equipo de Pipely

# -- Plantilla: Cambio de contraseña (email de confirmación) --
passwordReset.subject=Pipely — Tu contraseña fue actualizada
passwordReset.body=\
Hola {0},\n\n\
Tu contraseña ha sido actualizada correctamente.\n\
Si no fuiste tú, contacta al administrador de inmediato.\n\n\
Saludos,\n\
El equipo de Pipely

# -- Plantilla: Actualizar contraseña (email) ---------------
updatePassword.subject=Pipely — Actualiza tu contraseña
updatePassword.body=\
Hola {0},\n\n\
Se te solicita actualizar tu contraseña.\n\
Haz clic en el siguiente enlace para establecer una nueva contraseña:\n\n\
{1}\n\n\
Saludos,\n\
El equipo de Pipely

# -- Labels comunes -----------------------------------------
label.email=E-mail
label.username=Nombre de usuario
label.password=Contraseña
label.greeting=Hola {0}
label.signature=El equipo de Pipely
label.privacy=Política de privacidad

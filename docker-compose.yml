services:
  postgres:
    image: postgres:17-alpine
    container_name: crm2-postgres
    environment:
      POSTGRES_DB: crm2
      POSTGRES_USER: crm2
      POSTGRES_PASSWORD: crm2
    ports:
      - "5433:5432"
    volumes:
      - crm2-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm2 -d crm2"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:25.0.6
    container_name: crm2-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: 8180
    ports:
      - "8180:8180"
    volumes:
      - crm2-keycloak-data:/opt/keycloak/data
      - ./Keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8180; echo -e 'GET /health/ready HTTP/1.1\\r\\nhost: localhost\\r\\n\\r\\n' >&3; timeout 1 cat <&3 | grep -q '200 OK' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    command: start-dev --import-realm

  keycloak-db:
    image: postgres:16-alpine
    container_name: crm2-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    ports:
      - "5434:5432"
    volumes:
      - crm2-keycloak-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  crm2-pgdata:
  crm2-keycloak-data:
  crm2-keycloak-pgdata:
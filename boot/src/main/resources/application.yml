spring:
  application:
    name: CRM2

  datasource:
    url: ${CRM2_DB_URL:jdbc:postgresql://localhost:5433/crm2}
    username: ${CRM2_DB_USERNAME:crm2}
    password: ${CRM2_DB_PASSWORD:crm2}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000

  sql:
    init:
      mode: always

  jpa:
    hibernate:
      ddl-auto: update
    # Run schema.sql/data.sql AFTER Hibernate creates the entity tables.
    # schema.sql is a patch script (drops legacy columns, adds indexes, FKs to
    # Hibernate-managed tables like `fichas`), so it must run last. Without this,
    # Spring runs the scripts before Hibernate and fails on an empty database.
    defer-datasource-initialization: true
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${CRM2_KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/crm2-local}
          audiences: ${CRM2_KEYCLOAK_AUDIENCE:crm2-api}

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${CRM2_NOTIFICATION_MAIL_USERNAME:}
    password: ${CRM2_NOTIFICATION_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080

crm2:
  keycloak:
    admin:
      server-url: ${CRM2_KEYCLOAK_SERVER_URL:http://localhost:8180}
      realm: ${CRM2_KEYCLOAK_REALM:crm2-local}
      client-id: ${CRM2_KEYCLOAK_CLIENT_ID:crm2-api}
      client-secret: ${KEYCLOAK_ADMIN_SECRET:admin-secret}
      connect-timeout-ms: 5000
      read-timeout-ms: 10000
  mail:
    from-address: ${CRM2_MAIL_FROM_ADDRESS:${CRM2_NOTIFICATION_MAIL_USERNAME:}}
  reminder:
    fixed-delay-ms: 60000

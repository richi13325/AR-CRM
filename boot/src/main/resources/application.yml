spring:
  application:
    name: CRM2

  datasource:
    url: jdbc:postgresql://localhost:5433/crm2
    username: crm2
    password: crm2
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000

  sql:
    init:
      mode: always

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/crm2-local
          audiences: crm2-api

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${CRM2_NOTIFICATION_MAIL_USERNAME:}
    password: ${CRM2_NOTIFICATION_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080

crm2:
  keycloak:
    admin:
      server-url: http://localhost:8180
      realm: crm2-local
      client-id: crm2-api
      client-secret: ${KEYCLOAK_ADMIN_SECRET:admin-secret}
      connect-timeout-ms: 5000
      read-timeout-ms: 10000
  mail:
    from-address: ${CRM2_MAIL_FROM_ADDRESS:${CRM2_NOTIFICATION_MAIL_USERNAME:}}
  reminder:
    fixed-delay-ms: 60000

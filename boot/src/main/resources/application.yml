spring:
  application:
    name: CRM2

  datasource:
    url: ${CRM2_DB_URL:jdbc:postgresql://localhost:5433/crm2}
    username: ${CRM2_DB_USERNAME:crm2}
    password: ${CRM2_DB_PASSWORD:crm2}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000

  sql:
    init:
      mode: always

  jpa:
    hibernate:
      ddl-auto: update
    # Run schema.sql/data.sql AFTER Hibernate creates the entity tables.
    # schema.sql is a patch script (drops legacy columns, adds indexes, FKs to
    # Hibernate-managed tables like `fichas`), so it must run last. Without this,
    # Spring runs the scripts before Hibernate and fails on an empty database.
    defer-datasource-initialization: true
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: America/Mexico_City

  jackson:
    time-zone: America/Mexico_City

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${CRM2_KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/crm2-local}
          audiences: ${CRM2_KEYCLOAK_AUDIENCE:crm2-api}

  # AI Assistant (PR 4 — Spring AI). Feature-flagged and bounded to keep the
  # AI surface opt-in and safe-by-default.
  ai:
    openai:
      # Base URL of the OpenAI-compatible Anthropic gateway. The CRM uses
      # Anthropic Claude as the default model; the OpenAI starter is wired
      # because Anthropic does not ship an official Spring AI starter yet.
      base-url: ${AI_OPENAI_BASE_URL:https://api.anthropic.com/v1/}
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: ${ANTHROPIC_MODEL:claude-haiku-4-5-20251001}
          # Per-turn wall-clock timeout. Spring AI's provider HTTP
          # client enforces this against the upstream LLM; the
          # OpenAiChatAdapter runs ChatClient.call() synchronously on
          # the request thread, so a tight `timeout` value here is the
          # runtime gate for "the model took too long". Configuring it
          # shorter than the per-handler wall-clock budget below
          # ensures the framework aborts first and the boundary
          # surfaces a controlled AiAssistantException -> HTTP 502.
          timeout: ${AI_OPENAI_TIMEOUT:PT30S}
          temperature: 0.2
          max-tokens: 2048

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${CRM2_NOTIFICATION_MAIL_USERNAME:}
    password: ${CRM2_NOTIFICATION_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080

crm2:
  keycloak:
    admin:
      server-url: ${CRM2_KEYCLOAK_SERVER_URL:http://localhost:8180}
      realm: ${CRM2_KEYCLOAK_REALM:crm2-local}
      client-id: ${CRM2_KEYCLOAK_CLIENT_ID:crm2-api}
      client-secret: ${KEYCLOAK_ADMIN_SECRET:admin-secret}
      connect-timeout-ms: 5000
      read-timeout-ms: 10000
  mail:
    from-address: ${CRM2_MAIL_FROM_ADDRESS:${CRM2_NOTIFICATION_MAIL_USERNAME:}}
  reminder:
    fixed-delay-ms: 60000
  cors:
    # Comma-separated list of allowed frontend origins. In prod set
    # CRM2_CORS_ALLOWED_ORIGINS to your deployed frontend URL(s).
    allowed-origins: ${CRM2_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  wa:
    # API key that n8n sends in x-api-key header to the webhook endpoint.
    # In prod set WA_WEBHOOK_API_KEY to a strong random secret.
    webhook-api-key: ${WA_WEBHOOK_API_KEY:change-me-in-prod}
    # URL pública donde Evolution API puede alcanzar a ESTE backend para
    # mandar mensajes entrantes en tiempo real (ej. https://mi-crm.easypanel.host).
    # Vacío = no se configura webhook (ej. dev local sin túnel expuesto a internet).
    webhook-base-url: ${WA_WEBHOOK_BASE_URL:}
    evolution:
      # URL base de tu servidor Evolution API (sin trailing slash)
      api-url: ${EVOLUTION_API_URL:}
      # Global API key de Evolution API
      api-key: ${EVOLUTION_API_KEY:}

# Sugerencia de respuesta con IA (Claude). Sin ANTHROPIC_API_KEY el botón ✨ devuelve error.
anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  model: ${ANTHROPIC_MODEL:claude-haiku-4-5-20251001}

# ───────────────────────────────────────────────────────────────────────────
# AI Assistant (PR 4 — Spring AI). Feature-flagged and bounded to keep the
# AI surface opt-in and safe-by-default. Spring AI config lives under
# the merged `spring.ai.*` block above to avoid a duplicate top-level key.
# ───────────────────────────────────────────────────────────────────────────

# CRM-side AI feature flags and safety budgets. Defaults are conservative;
# a misconfigured deploy cannot enable the AI surface accidentally.
ai-assistant:
  # Master kill-switch. The AiController bean is only registered when
  # this is true (see WiringConfig); setting it to false disables the
  # REST endpoint, the @Tool surface and the OpenAiChatAdapter in one
  # place.
  enabled: ${AI_ASSISTANT_ENABLED:false}
  # Phase 1 memory mutations are disabled by default. The AI module may
  # read active conversation-scoped rows from `ai_memoria`, but any save
  # or delete attempt is rejected while this flag stays false.
  phase1:
    memory-writes-enabled: ${AI_MEMORY_WRITES_ENABLED:false}
  # Per-conversation token budget. The AnalizarChatService rejects
  # turns that would exceed this; the per-turn handler aborts the
  # loop with a 502 timeout error when the budget is consumed.
  token-budget-per-conversation: ${AI_TOKEN_BUDGET:12000}
  # Max tool calls the model may issue per turn. This value is
  # surfaced as a deterministic test seam in OpenAiChatAdapter
  # (assertToolCallBudget(int)) so callers and tests can verify the
  # configured budget end-to-end. Spring AI 2.0 does NOT expose a
  # built-in per-tool-call knob in the ChatClient chain, so this
  # value is a validated configuration surface only — real loop-
  # stopping enforcement requires a custom CallAdvisor (follow-up).
  # See design.md "Architecture Decisions" and apply-progress.md
  # "Slice 10 — AI tool-safety honesty correction".
  max-tool-calls-per-turn: ${AI_MAX_TOOL_CALLS:5}
  # Per-turn wall-clock budget in milliseconds. Surfaced as a
  # deterministic test seam in OpenAiChatAdapter
  # (getTurnTimeoutMillis()). The runtime per-turn HTTP-timeout
  # gate is owned by Spring AI's auto-configured provider via
  # spring.ai.openai.chat.options.timeout above — not by this
  # value. Configuring timeout (ISO-8601) shorter than this budget
  # ensures the framework aborts first; the boundary then surfaces
  # the abort as AiAssistantException -> HTTP 502. Wrapping the
  # chat call in CompletableFuture.supplyAsync(...).orTimeout(...)
  # was attempted in an earlier iteration but it broke thread-local
  # tool-context propagation for @Tool callbacks (audit #1) and
  # has been removed.
  turn-timeout-ms: ${AI_TURN_TIMEOUT_MS:25000}
  # TTL (minutes) applied to staged AI action proposals when the model
  # does not supply an explicit value. Matches the default in
  # AnalizarChatService.
  default-proposal-ttl-minutes: ${AI_PROPOSAL_TTL_MIN:60}
